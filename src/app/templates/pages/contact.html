<div class="min-h-screen bg-gray-50">
  <!-- Header Section -->
  <section class="bg-gradient-to-r from-purple-600 to-pink-600 text-white py-16">
    <div class="container mx-auto px-6 text-center">
      <h1 class="text-4xl font-bold mb-4">Contact Us</h1>
      <p class="text-xl">We'd love to hear from you!</p>
    </div>
  </section>

  <!-- Contact Form Section -->
  <section class="py-16">
    <div class="container mx-auto px-6">
      <div class="max-w-4xl mx-auto">
        <div class="grid md:grid-cols-2 gap-12">
          <!-- Contact Form -->
          <div class="bg-white rounded-lg shadow-lg p-8">
            <h2 class="text-2xl font-bold mb-6 text-gray-800">Send us a message</h2>
            <form (ngSubmit)="onSubmit()" #contactForm="ngForm">
              <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="name">
                  Name
                </label>
                <input 
                  class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:border-blue-500"
                  id="name" 
                  type="text" 
                  [(ngModel)]="contactData.name"
                  name="name"
                  required
                  placeholder="Your Name">
              </div>
              
              <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="email">
                  Email
                </label>
                <input 
                  class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:border-blue-500"
                  id="email" 
                  type="email" 
                  [(ngModel)]="contactData.email"
                  name="email"
                  required
                  placeholder="your.email@example.com">
              </div>
              
              <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="message">
                  Message
                </label>
                <textarea 
                  class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:border-blue-500"
                  id="message" 
                  rows="4"
                  [(ngModel)]="contactData.message"
                  name="message"
                  required
                  placeholder="Your message here..."></textarea>
              </div>
              
            </form>
          </div>

          <!-- Contact Info -->
          <div class="space-y-8">
            <div class="bg-white rounded-lg shadow-lg p-8">
              <h3 class="text-xl font-bold mb-4 text-gray-800">Get in touch</h3>
              <div class="space-y-4">
                <div class="flex items-center">
                  <div class="text-blue-600 mr-3">📧</div>
                  <div>
                    <p class="font-semibold">Email</p>
                    <p class="text-gray-600">hello@zapapp.com</p>
                  </div>
                </div>
                <div class="flex items-center">
                  <div class="text-blue-600 mr-3">📱</div>
                  <div>
                    <p class="font-semibold">Phone</p>
                    <p class="text-gray-600">+1 (555) 123-4567</p>
                  </div>
                </div>
                <div class="flex items-center">
                  <div class="text-blue-600 mr-3">📍</div>
                  <div>
                    <p class="font-semibold">Address</p>
                    <p class="text-gray-600">123 Tech Street<br>Silicon Valley, CA 94000</p>
                  </div>
                </div>
              </div>
            </div>

            <!-- Office Hours -->
            <div class="bg-white rounded-lg shadow-lg p-8">
              <h3 class="text-xl font-bold mb-4 text-gray-800">Office Hours</h3>
              <div class="space-y-2 text-gray-600">
                <p><span class="font-semibold">Monday - Friday:</span> 9:00 AM - 6:00 PM</p>
                <p><span class="font-semibold">Saturday:</span> 10:00 AM - 4:00 PM</p>
                <p><span class="font-semibold">Sunday:</span> Closed</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</div>
